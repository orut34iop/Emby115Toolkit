[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (may use filesystem, HTTP mocking)
    slow: Tests that take >1s
    gui: Tests requiring GUI mocking
    thread: Tests involving threading
    emby: Tests for EmbyOperator HTTP interactions
    file_system: Tests touching real filesystem
